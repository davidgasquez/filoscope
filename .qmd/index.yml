collections:
  fdp:
    path: collections/filecoin-data-portal
    pattern: "{**/*.{md,py,sql,toml,yml,yaml,json},**/Makefile,**/AGENTS.md}"
    context:
      "/": Filecoin Data Portal codebase for a local-first DuckDB and Python pipeline indexing Filecoin datasets, asset metadata, tests, docs, and web publishing for network metrics, providers, clients, verified claims, DataCap, FEVM logs, Filecoin Pay, PDP, and warm storage.
  dealbot:
    path: collections/dealbot
    pattern: "{**/*.{md,ts,tsx,js,mjs,html,css,graphql,sh,toml,yml,yaml,json,jsonc},**/Makefile,**/Dockerfile*,**/.env.example,**/.npmrc}"
    context:
      "/": TypeScript monorepo for Deal Bot, an automated Filecoin PDP deal creation and performance monitoring system, covering NestJS backend APIs and workers, pg-boss scheduling, provider checks, retrieval testing, metrics, Postgres persistence, Synapse wallet and contract integration, Graph Protocol subgraph indexing, React/Vite dashboard, deployment docs, runbooks, and production operations.
  builtin-actors:
    path: collections/builtin-actors
    pattern: "{**/*.{md,rs,sol,fe,eas,sh,toml,yml,yaml,json},**/Makefile,**/Dockerfile}"
    context:
      "/": Canonical Rust implementation of Filecoin built-in actors for FVM networks, covering actor state and methods, runtime utilities, test VM and integration tests, Wasm compilation, CARv1 manifests, storage miner, storage market, EVM actor, and release workflows.
  curio:
    path: collections/curio
    pattern: "{**/*.{md,go,sql,sh,bash,py,template,tmpl,html,css,service,conf,toml,yml,yaml,json},**/Makefile,**/Dockerfile,**/go.mod,**/go.work}"
    context:
      "/": Go implementation of Filecoin Curio storage-provider software, covering sector sealing and proving, task scheduling, storage orchestration, deal and market workflows, APIs, CLI operations, configuration, deployment, monitoring, and integration tests.
  lotus:
    path: collections/lotus
    pattern: "{**/*.{md,go,sol,sql,sh,bash,py,asm,template,tmpl,html,css,service,conf,toml,yml,yaml,json},**/Makefile,**/Dockerfile,**/go.mod,GO_VERSION_MIN,scripts/bash-completion/lotus,scripts/zsh-completion/lotus,scripts/dev/drop-local-repos,scripts/dev/gen-daemon,scripts/dev/sminer-init,scripts/mkreleaselog}"
    context:
      "/": Go implementation of Filecoin Lotus node, miner, worker, and gateway, including chain sync and validation, FVM state execution, message pool, storage sealing and proving, APIs, CLI, Ethereum compatibility, F3 finality, indexing, monitoring, releases, and integration tests.
  lily:
    path: collections/lily
    pattern: "{**/*.{md,go,sql,sh,template,tpl,mod,env,toml,yml,yaml,json},**/Makefile,deployment/.env.example,scripts/fiximports,build/grafana/config.monitoring}"
    context:
      "/": Instrumented Lotus-based Filecoin indexer source covering chain walking, tipset watching, actor state extraction, messages, receipts, gas economics, FEVM transactions, traces, contracts, TimescaleDB schemas and migrations, CSV storage, network surveys, and deployment operations tooling.
  forest:
    path: collections/forest
    pattern: "{**/*.{md,mdx,rs,go,sh,js,ts,tsx,css,rb,py,sol,proto,tpl,toml,yml,yaml,json,dockerfile},**/Makefile,**/go.mod,**/go.work,**/Dockerfile*}"
    context:
      "/": Rust Filecoin node collection covering Forest daemon, CLI, wallet, tool binaries, JSON-RPC, OpenRPC APIs, chain sync and validation, FVM state execution and migrations, libp2p networking, snapshots, CAR storage, Ethereum compatibility, F3 sidecar, monitoring, tests, CI, and docs.
  filecoin-docs:
    path: collections/filecoin-docs
    pattern: "{**/*.{md,mdx,ts,js,mjs,sh,json,toml,yml,yaml},**/Makefile}"
    context:
      "/": Documentation for Filecoin network concepts, storage and retrieval workflows, FVM and FEVM smart-contract development, Filecoin Onchain Cloud, Synapse SDK, storage-provider operations, networks, FIL assets, JSON-RPC APIs, built-in actors, and ecosystem tools.
  filecoin-cloud:
    path: collections/filecoin-cloud
    pattern: "{**/*.{md,mdx,ts,tsx,js,mjs,css,json,jsonc,toml,yml,yaml},**/.npmrc,**/.nvmrc}"
    context:
      "/": Next.js website for Filecoin Onchain Cloud at filecoin.cloud, covering Warm Storage Service information, service-provider registry UI and filtering, PDP capabilities and reachability metadata, deployment addresses, ABI sync, structured data, SEO, and Synapse SDK integration checks.
  filecoin-pin:
    path: collections/filecoin-pin
    pattern: "{**/*.{md,mdx,ts,tsx,js,mjs,json,jsonc,toml,yml,yaml,svg},**/AGENTS.md,**/.npmrc}"
    context:
      "/": TypeScript implementation of Filecoin Pin for persistent, verifiable IPFS content storage on Filecoin PDP, covering CLI commands, JavaScript library APIs, GitHub upload action, beta IPFS Pinning Service API server, Synapse SDK integration, CAR/UnixFS uploads, payment and session-key flows, provider selection, telemetry, docs, examples, and tests.
  fips:
    path: collections/fips
    pattern: "{**/*.{md,go,sh,py,ipynb,json,toml,yml,yaml},**/Makefile}"
    context:
      "/": Filecoin Improvement Proposal records covering FIPs and FRCs for protocol changes, governance process, standards, network upgrades, storage-market economics, FVM and FEVM behavior, consensus, proofs, node APIs, and proposal lifecycle metadata from draft through final.
  filecoin-services:
    path: collections/filecoin-services
    pattern: "{**/*.{md,sol,sh,js,jq,toml,yml,yaml,json},**/Makefile,.gitmodules}"
    context:
      "/": Smart contracts, specifications, ABI artifacts, deployment addresses, tests, and runbooks for Filecoin Warm Storage Service, covering PDP proof validation, FilecoinPay rails, USDFC pricing, CDN and FilBeam settlement, provider registry, StateView extsload access, UUPS upgrades, and releases.
  porep-market:
    path: collections/porep-market
    pattern: "{**/*.{md,sol,sh,py,toml,yml,yaml,json},**/Makefile,**/justfile,**/remappings.txt,**/.env.example}"
    context:
      "/": Solidity and Foundry contracts plus V2 specs for PoRep Market, covering Filecoin storage deal orchestration, storage-provider offer matching and capacity, DataCap and VerifReg evidence adapters, SLI validation, FilecoinPay validator settlement, deployments, ABIs, tests, and V1 reference snapshot.
  filecoin-pay:
    path: collections/filecoin-pay
    pattern: "{**/*.{md,sol,sh,toml,yml,yaml,json},**/Makefile,.gitmodules}"
    context:
      "/": Solidity and Foundry implementation and documentation for FilecoinPayV1 payment rails on Filecoin, covering ERC20 and FIL account funding, operator approvals, lockup accounting, rate changes, one-time payments, validator arbitration, settlement, termination, fees, deployments, audits, and tests.
  synapse-sdk:
    path: collections/synapse-sdk
    pattern: "{**/*.{md,mdx,ts,tsx,js,mjs,astro,html,css,json,jsonc,webmanifest,toml,yml,yaml},**/Makefile,**/AGENTS.md,**/_headers}"
    context:
      "/": TypeScript and JavaScript monorepo and docs for Synapse SDK, Core, and React packages integrating Filecoin Onchain Cloud storage, Filecoin Pay, Warm Storage, PDP verification, provider discovery, PieceCID handling, session keys, examples, and playground apps.
  pdp:
    path: collections/pdp
    pattern: "{**/*.{md,sol,sh,toml,yml,yaml,json},**/Makefile,**/configure,.gitmodules}"
    context:
      "/": Solidity contracts, tests, deployment scripts, and design notes for Filecoin Provable Data Possession, covering PDPVerifier data sets, Piece CID v2 handling, Merkle possession proofs, challenge randomness, proving periods, fault reporting, gas benchmarks, upgrades, and cleanup deposits.
