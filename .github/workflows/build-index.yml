name: Build Filoscope index

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-filoscope-index
  cancel-in-progress: false

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install latest QMD from GitHub
        run: |
          qmd_dir="${RUNNER_TEMP}/qmd"
          qmd_ref="e428df76bc0274d9e93eb7ca3e95673315c42e90"
          git init --quiet "${qmd_dir}"
          git -C "${qmd_dir}" fetch --depth 1 https://github.com/tobi/qmd.git "${qmd_ref}"
          git -C "${qmd_dir}" checkout --detach FETCH_HEAD
          npm install --prefix "${qmd_dir}"
          npm run --prefix "${qmd_dir}" build
          (cd "${qmd_dir}" && npm pack --silent --pack-destination "${RUNNER_TEMP}")
          npm install --no-save --package-lock=false "${RUNNER_TEMP}/tobilu-qmd-2.6.3.tgz"
          npm exec -- qmd embed --help | grep -F -- "--timeout <minutes>"

      - name: Test
        run: npm test

      - name: Cache QMD models
        uses: actions/cache@v4
        with:
          path: ~/.cache/qmd/models
          key: qmd-models-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: qmd-models-${{ runner.os }}-

      - name: Pull latest published index
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run filoscope -- pull

      - name: Build and publish index
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          QMD_FORCE_CPU: "1"
        run: npm run filoscope -- publish
