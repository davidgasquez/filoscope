name: Build Filoscope index

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-filoscope-index
  cancel-in-progress: false

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify QMD
        run: |
          npm ls @tobilu/qmd --depth=0 | grep -F -- "@tobilu/qmd@2.6.3"
          npm exec -- qmd embed --help | grep -F -- "--timeout <minutes>"

      - name: Test
        run: npm test

      - name: Cache QMD models
        uses: actions/cache@v4
        with:
          path: ~/.cache/qmd/models
          key: qmd-models-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: qmd-models-${{ runner.os }}-

      - name: Pull latest published index
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run filoscope -- pull

      - name: Build and publish index
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          QMD_FORCE_CPU: "1"
        run: npm run filoscope -- publish
